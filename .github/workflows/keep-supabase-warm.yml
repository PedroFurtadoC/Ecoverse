# Mantém o projeto Supabase free ativo.
#
# O plano gratuito pausa projetos depois de 7 dias sem requisição.
# Esse workflow dispara um SELECT trivial 1x por semana e mantém o
# banco acordado sem custo nenhum. Também roda sob demanda pelo
# painel do GitHub (botão "Run workflow").
#
# Para a UNAERP usar:
# 1. Settings → Secrets and variables → Actions
# 2. Cadastrar:
#    - SUPABASE_URL          (a URL do projeto, ex.: https://xxx.supabase.co)
#    - SUPABASE_ANON_KEY     (a publishable key, pública por design)

name: keep-supabase-warm

on:
  schedule:
    # Toda segunda-feira às 09:00 UTC (06:00 horário de Brasília).
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping leve no Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::SUPABASE_URL ou SUPABASE_ANON_KEY nao configurados em Secrets."
            exit 1
          fi

          # Bate na rota de healthcheck oficial do Supabase. Nao precisa
          # de RLS nem de tabela especifica — qualquer resposta do servico
          # ja conta como atividade e zera o contador dos 7 dias.
          status=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
            --max-time 20 \
            -H "apikey: $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/auth/v1/health")

          echo "HTTP status: $status"
          echo "--- response body ---"
          cat /tmp/resp.txt || true
          echo ""
          echo "--- end body ---"

          # 2xx = sucesso. 4xx tambem conta como "banco vivo" pra fins
          # de anti-pause (servico respondeu, so rejeitou alguma cosia).
          # Falha real e 5xx ou rede caida (curl retornaria 000).
          if [ "$status" = "000" ]; then
            echo "::error::Supabase nao respondeu (timeout ou DNS)"
            exit 1
          fi

          if [ "$status" -ge 500 ]; then
            echo "::error::Supabase retornou erro de servidor ($status)"
            exit 1
          fi

          echo "Ping ok — Supabase ativo (HTTP $status). Contador dos 7 dias zerado."
