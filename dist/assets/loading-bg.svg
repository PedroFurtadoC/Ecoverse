<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="loadBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B2E1A"/>
      <stop offset="50%" stop-color="#143D24"/>
      <stop offset="100%" stop-color="#0A1F12"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#2ECC71" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0B2E1A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.6"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#loadBg)"/>
  <rect width="1920" height="1080" fill="url(#centerGlow)"/>
  <!-- Subtle leaf silhouettes -->
  <g opacity="0.08">
    <ellipse cx="200" cy="900" rx="120" ry="80" fill="#2ECC71"/>
    <ellipse cx="1750" cy="850" rx="140" ry="90" fill="#27AE60"/>
    <ellipse cx="150" cy="200" rx="100" ry="70" fill="#27AE60"/>
    <ellipse cx="1800" cy="180" rx="110" ry="75" fill="#2ECC71"/>
    <path d="M300,1000 Q350,920 400,1000" fill="#27AE60"/>
    <path d="M1600,980 Q1650,900 1700,980" fill="#2ECC71"/>
  </g>
  <!-- Particle dots -->
  <g opacity="0.12">
    <circle cx="400" cy="300" r="2" fill="#2ECC71"/>
    <circle cx="800" cy="200" r="1.5" fill="#F1C40F"/>
    <circle cx="1200" cy="350" r="2" fill="#2ECC71"/>
    <circle cx="600" cy="700" r="1.5" fill="#27AE60"/>
    <circle cx="1400" cy="600" r="2" fill="#F1C40F"/>
    <circle cx="300" cy="500" r="1" fill="#2ECC71"/>
    <circle cx="1600" cy="400" r="1.5" fill="#27AE60"/>
    <circle cx="960" cy="800" r="2" fill="#2ECC71"/>
  </g>
  <!-- Vignette overlay -->
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
