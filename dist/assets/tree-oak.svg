<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" width="80" height="100">
  <defs>
    <linearGradient id="trunk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6B4226"/>
      <stop offset="35%" stop-color="#8B6340"/>
      <stop offset="100%" stop-color="#5A3520"/>
    </linearGradient>
    <radialGradient id="canopy1" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="70%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </radialGradient>
    <radialGradient id="canopy2" cx="55%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </radialGradient>
  </defs>
  <!-- Trunk -->
  <path d="M34,60 L34,96 Q37,100 40,100 Q43,100 46,96 L46,60Z" fill="url(#trunk)"/>
  <!-- Trunk texture -->
  <path d="M38,65 Q36,72 38,80 Q37,88 39,96" stroke="#5A3520" stroke-width="0.7" fill="none" opacity="0.4"/>
  <!-- Branch stubs -->
  <line x1="34" y1="68" x2="28" y2="64" stroke="#6B4226" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="46" y1="72" x2="52" y2="69" stroke="#6B4226" stroke-width="2" stroke-linecap="round"/>
  <!-- Main canopy (back) -->
  <ellipse cx="40" cy="38" rx="35" ry="30" fill="url(#canopy1)"/>
  <!-- Canopy cluster (right) -->
  <ellipse cx="52" cy="32" rx="22" ry="20" fill="url(#canopy2)" opacity="0.85"/>
  <!-- Canopy cluster (left-top) -->
  <ellipse cx="30" cy="28" rx="20" ry="18" fill="#43A047" opacity="0.75"/>
  <!-- Top cluster -->
  <ellipse cx="42" cy="18" rx="16" ry="14" fill="#4CAF50" opacity="0.8"/>
  <!-- Highlights -->
  <ellipse cx="36" cy="22" rx="10" ry="8" fill="#6ACA6E" opacity="0.25"/>
  <ellipse cx="50" cy="30" rx="8" ry="6" fill="#81D884" opacity="0.2"/>
  <!-- Shadow depth -->
  <ellipse cx="38" cy="50" rx="24" ry="10" fill="#1B5E20" opacity="0.2"/>
</svg>
