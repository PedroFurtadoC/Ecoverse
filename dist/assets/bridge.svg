<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 40" width="80" height="40">
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A0845C"/>
      <stop offset="100%" stop-color="#7A6545"/>
    </linearGradient>
  </defs>
  <!-- Bridge deck -->
  <rect x="4" y="16" width="72" height="8" rx="2" fill="url(#wood)" stroke="#6B5634" stroke-width="1"/>
  <!-- Planks -->
  <line x1="15" y1="16" x2="15" y2="24" stroke="#6B5634" stroke-width="0.6" opacity="0.3"/>
  <line x1="28" y1="16" x2="28" y2="24" stroke="#6B5634" stroke-width="0.6" opacity="0.3"/>
  <line x1="41" y1="16" x2="41" y2="24" stroke="#6B5634" stroke-width="0.6" opacity="0.3"/>
  <line x1="54" y1="16" x2="54" y2="24" stroke="#6B5634" stroke-width="0.6" opacity="0.3"/>
  <line x1="67" y1="16" x2="67" y2="24" stroke="#6B5634" stroke-width="0.6" opacity="0.3"/>
  <!-- Left post -->
  <rect x="8" y="4" width="4" height="24" rx="1" fill="#8B7355"/>
  <!-- Right post -->
  <rect x="68" y="4" width="4" height="24" rx="1" fill="#8B7355"/>
  <!-- Rope/railing -->
  <path d="M10,6 Q25,12 40,8 Q55,4 70,6" stroke="#B8A67A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Rope sag -->
  <path d="M10,10 Q25,15 40,12 Q55,9 70,10" stroke="#B8A67A" stroke-width="1" fill="none" opacity="0.5" stroke-linecap="round"/>
  <!-- Shadow -->
  <ellipse cx="40" cy="36" rx="34" ry="4" fill="#000" opacity="0.08"/>
</svg>
