<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" width="80" height="100">
  <defs>
    <linearGradient id="trk1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6D4C2A"/>
      <stop offset="50%" stop-color="#A07850"/>
      <stop offset="100%" stop-color="#6D4C2A"/>
    </linearGradient>
    <linearGradient id="trk2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#C4975E"/>
      <stop offset="50%" stop-color="#E2BF8A"/>
      <stop offset="100%" stop-color="#C4975E"/>
    </linearGradient>
    <linearGradient id="fA" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#5CB85C"/>
      <stop offset="100%" stop-color="#3D8B3D"/>
    </linearGradient>
    <linearGradient id="fB" x1="0" y1="0.2" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#6FCF6F"/>
      <stop offset="100%" stop-color="#4A9E4A"/>
    </linearGradient>
    <linearGradient id="fC" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
  </defs>

  <!-- ===== Trunk (curved, segmented flat style) ===== -->
  <!-- Trunk base shape -->
  <path d="M38,52 Q36,65 37,78 Q38,88 40,98 L44,98 Q46,88 47,78 Q48,65 45,52Z" fill="url(#trk1)"/>
  <!-- Light segment bands -->
  <path d="M38.5,58 Q41,56 44.5,58 L44.8,62 Q41.5,60 38.2,62Z" fill="url(#trk2)" opacity="0.8"/>
  <path d="M38,66 Q41,64 45,66 L45.3,70 Q41.5,68 37.7,70Z" fill="url(#trk2)" opacity="0.75"/>
  <path d="M37.5,74 Q41,72 46,74 L46.2,78 Q41.5,76 37.3,78Z" fill="url(#trk2)" opacity="0.7"/>
  <path d="M38,82 Q41,80 46,82 L45.5,86 Q41.5,84 38.5,86Z" fill="url(#trk2)" opacity="0.65"/>
  <path d="M39,90 Q42,88 45,90 L44.5,94 Q42,92 39.5,94Z" fill="url(#trk2)" opacity="0.6"/>

  <!-- ===== Fronds (flat swooping style) ===== -->
  <!-- Back fronds (darker, behind) -->
  <path d="M41,50 C48,42 60,38 72,42 C65,38 55,36 48,40 C44,43 42,47 41,50Z" fill="#3D8B3D" opacity="0.6"/>
  <path d="M41,50 C34,42 22,38 10,42 C17,38 27,36 34,40 C38,43 40,47 41,50Z" fill="#3D8B3D" opacity="0.6"/>

  <!-- Right large frond -->
  <path d="M41,48 C50,38 62,30 75,32 C68,30 58,28 50,32 C44,36 42,42 41,48Z" fill="url(#fA)"/>
  <!-- Right frond leaf detail -->
  <path d="M50,33 C54,30 60,28 66,30" stroke="#3D8B3D" stroke-width="0.6" fill="none" opacity="0.3"/>

  <!-- Right drooping frond -->
  <path d="M42,50 C52,46 64,46 74,52 C66,46 56,44 48,46 C44,48 42,49 42,50Z" fill="url(#fC)" opacity="0.85"/>

  <!-- Left large frond -->
  <path d="M41,48 C32,38 20,30 7,32 C14,30 24,28 32,32 C38,36 40,42 41,48Z" fill="url(#fA)"/>
  <!-- Left frond detail -->
  <path d="M32,33 C28,30 22,28 16,30" stroke="#3D8B3D" stroke-width="0.6" fill="none" opacity="0.3"/>

  <!-- Left drooping frond -->
  <path d="M40,50 C30,46 18,46 8,52 C16,46 26,44 34,46 C38,48 40,49 40,50Z" fill="url(#fC)" opacity="0.85"/>

  <!-- Top-right frond -->
  <path d="M42,48 C48,36 56,22 64,16 C58,20 50,30 46,38 C44,42 42,46 42,48Z" fill="url(#fB)"/>

  <!-- Top-left frond -->
  <path d="M40,48 C34,36 26,22 18,16 C24,20 32,30 36,38 C38,42 40,46 40,48Z" fill="url(#fB)"/>

  <!-- Top center frond -->
  <path d="M41,48 C40,38 38,24 36,12 C38,22 40,34 41,42 C42,34 44,22 46,12 C44,24 42,38 41,48Z" fill="#4CAF50" opacity="0.9"/>

  <!-- Frond highlights -->
  <path d="M42,48 C50,36 60,28 72,30" stroke="#81C784" stroke-width="0.5" fill="none" opacity="0.25"/>
  <path d="M40,48 C32,36 22,28 10,30" stroke="#81C784" stroke-width="0.5" fill="none" opacity="0.25"/>
  <path d="M41,48 C40,36 38,22 36,14" stroke="#A5D6A7" stroke-width="0.4" fill="none" opacity="0.2"/>

  <!-- Coconuts -->
  <circle cx="39" cy="51" r="2.8" fill="#8D6E4C"/>
  <circle cx="43.5" cy="50.5" r="2.5" fill="#7A5C3A"/>
  <circle cx="41" cy="53.5" r="2.2" fill="#A0835E"/>
  <!-- Coconut shines -->
  <circle cx="38.3" cy="50.2" r="0.7" fill="#FFF" opacity="0.15"/>
  <circle cx="43" cy="49.8" r="0.6" fill="#FFF" opacity="0.12"/>
</svg>
