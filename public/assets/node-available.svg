<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="availBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ECC71"/>
      <stop offset="100%" stop-color="#27AE60"/>
    </linearGradient>
    <radialGradient id="availGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="availShadow" x="-20%" y="-10%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1A7A42" flood-opacity="0.5"/>
    </filter>
  </defs>
  <g filter="url(#availShadow)">
    <circle cx="40" cy="40" r="30" fill="url(#availBg)" stroke="#25A25A" stroke-width="2.5"/>
    <circle cx="40" cy="40" r="30" fill="url(#availGlow)"/>
    <circle cx="40" cy="40" r="25" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.25"/>
    <!-- Exclamation / quest mark -->
    <circle cx="40" cy="50" r="2.5" fill="#FFFFFF"/>
    <rect x="37.5" y="28" width="5" height="17" rx="2.5" fill="#FFFFFF"/>
  </g>
</svg>
