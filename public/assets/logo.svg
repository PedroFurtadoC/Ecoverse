<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <linearGradient id="leafG1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2ECC71"/>
      <stop offset="100%" stop-color="#1E8449"/>
    </linearGradient>
    <linearGradient id="leafG2" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#58D68D"/>
      <stop offset="100%" stop-color="#27AE60"/>
    </linearGradient>
    <linearGradient id="txtG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C8EBD6"/>
    </linearGradient>
    <linearGradient id="subG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7DCEA0"/>
      <stop offset="100%" stop-color="#A3E4BC"/>
    </linearGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softshadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- === LEAF ICON (left side) === -->
  <g transform="translate(28, 14)" filter="url(#glow)">
    <!-- Back leaf -->
    <path d="M28,88 Q8,52 22,18 Q28,4 34,22 Q40,48 30,68 Q29,76 28,88Z" fill="url(#leafG2)" opacity="0.65"/>
    <!-- Main leaf -->
    <path d="M35,88 Q35,38 68,12 Q88,0 82,28 Q76,52 55,64 Q42,72 35,88Z" fill="url(#leafG1)"/>
    <!-- Leaf vein (center) -->
    <path d="M35,85 Q40,58 62,38" stroke="#FFFFFF" stroke-width="1.8" fill="none" opacity="0.4" stroke-linecap="round"/>
    <!-- Leaf vein (side) -->
    <path d="M42,68 Q50,56 62,46" stroke="#FFFFFF" stroke-width="1" fill="none" opacity="0.25" stroke-linecap="round"/>
    <!-- Small sparkle -->
    <circle cx="60" cy="22" r="2.5" fill="#FFFFFF" opacity="0.35"/>
    <circle cx="65" cy="28" r="1.5" fill="#FFFFFF" opacity="0.2"/>
  </g>

