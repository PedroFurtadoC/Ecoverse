    <path d="M122,5 Q122,0 127,0 L128,0 Q133,0 133,5 L133,13 Q133,18 128,18 L127,18 Q122,18 122,13Z M125.5,5 L125.5,13 Q125.5,15.5 127,15.5 L128,15.5 Q129.5,15.5 129.5,13 L129.5,5 Q129.5,2.5 128,2.5 L127,2.5 Q125.5,2.5 125.5,5Z" fill-rule="evenodd"/>
