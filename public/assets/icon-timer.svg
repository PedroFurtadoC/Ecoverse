<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#E64A19"/>
    </linearGradient>
  </defs>
  <circle cx="16" cy="17" r="12" fill="url(#tg)" opacity="0.9"/>
  <circle cx="16" cy="17" r="12" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.25"/>
  <circle cx="16" cy="17" r="10" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.15"/>
  <!-- Clock hands -->
  <line x1="16" y1="17" x2="16" y2="10" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="17" x2="21" y2="17" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="16" cy="17" r="1.5" fill="#FFFFFF"/>
