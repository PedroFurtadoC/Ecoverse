  <!-- Hour marks -->
  <line x1="16" y1="6" x2="16" y2="8" stroke="#FFF" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <line x1="16" y1="26" x2="16" y2="28" stroke="#FFF" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <line x1="5" y1="17" x2="7" y2="17" stroke="#FFF" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <line x1="25" y1="17" x2="27" y2="17" stroke="#FFF" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
</svg>
