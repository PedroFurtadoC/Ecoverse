<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 60" width="40" height="60">
  <defs>
    <linearGradient id="wf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#80DEEA"/>
      <stop offset="50%" stop-color="#4DD0E1"/>
      <stop offset="100%" stop-color="#26C6DA"/>
    </linearGradient>
  </defs>
  <!-- Cliff sides -->
  <path d="M0,0 L12,0 L12,50 Q8,55 4,52 L0,48Z" fill="#757568" opacity="0.5"/>
  <path d="M28,0 L40,0 L40,48 Q36,52 32,55 L28,50Z" fill="#8A8A78" opacity="0.45"/>
  <!-- Water stream -->
  <rect x="14" y="0" width="12" height="50" rx="3" fill="url(#wf)" opacity="0.85"/>
  <!-- Water highlights -->
  <path d="M18,5 Q20,15 19,25 Q18,35 20,45" stroke="#FFF" stroke-width="1.5" fill="none" opacity="0.2" stroke-linecap="round"/>
  <path d="M22,8 Q24,18 23,30 Q22,40 24,48" stroke="#FFF" stroke-width="1" fill="none" opacity="0.15" stroke-linecap="round"/>
  <!-- Splash at bottom -->
  <ellipse cx="20" cy="52" rx="16" ry="5" fill="#B2EBF2" opacity="0.35"/>
  <ellipse cx="20" cy="54" rx="12" ry="3" fill="#FFF" opacity="0.15"/>
  <!-- Spray dots -->
  <circle cx="14" cy="48" r="1.5" fill="#FFF" opacity="0.25"/>
  <circle cx="26" cy="46" r="1.2" fill="#FFF" opacity="0.3"/>
  <circle cx="18" cy="44" r="1" fill="#FFF" opacity="0.2"/>
  <circle cx="24" cy="50" r="1.3" fill="#FFF" opacity="0.2"/>
  <!-- Rocks at base -->
  <ellipse cx="10" cy="56" rx="6" ry="3" fill="#8A8A78" opacity="0.4"/>
  <ellipse cx="30" cy="57" rx="5" ry="2.5" fill="#757568" opacity="0.35"/>
</svg>
